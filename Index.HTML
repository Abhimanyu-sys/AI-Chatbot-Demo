<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 380px;
            height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .msg {
            margin: 10px 0;
            display: flex;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 15px;
            max-width: 75%;
            font-size: 14px;
        }

        .user .bubble {
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot .bubble {
            background: #e5e7eb;
            color: black;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">AI Customer Assistant</div>

    <div id="chat"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type your message...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    let msg = document.getElementById("msg").value;

    let res = await fetch("http://127.0.0.1:5001/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="msg user">
            <div class="bubble">${msg}</div>
        </div>
    `;

    chat.innerHTML += `
        <div class="msg bot">
            <div class="bubble">${data.reply}</div>
        </div>
    `;

    document.getElementById("msg").value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
